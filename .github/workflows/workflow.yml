name: Test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: Run

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [26]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}

      # NOTE: `npm ci` triggers `lerna bootstrap` (lerna 4) which crashes on
      # Node >= 26 ("require is not defined in ES module scope"). CI will need
      # either lerna replaced (npm workspaces / pnpm) or a leaf-only install
      # strategy. Left in place so the failure mode is visible rather than silent.
      - name: Install
        run: npm ci

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: npm run lint

      - name: test
        run: npm run test:headless

      - name: Package vscode plugin
        if: matrix.os == 'ubuntu-latest'
        run: npm run package && mv packages/vscode-lit-plugin/out/packaged.vsix vscode-lit-plugin.vsix

      - name: Upload artifacts
        uses: actions/upload-artifact@master
        if: matrix.os == 'ubuntu-latest' && matrix.node == 16
        with:
          name: vscode-lit-plugin.vsix
          path: vscode-lit-plugin.vsix
